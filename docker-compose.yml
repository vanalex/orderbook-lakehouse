version: "3.8"

services:
  # ------------------------------------------------------------------
  # MinIO — S3-compatible object storage backing the Iceberg warehouse
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      # Lets MinIO recognize virtual-hosted-style requests (<bucket>.minio).
      # Polaris' own internal S3 client (used for server-side commit
      # bookkeeping, separate from the path-style config Spark clients use)
      # addresses buckets this way regardless of the catalog's
      # pathStyleAccess setting.
      MINIO_DOMAIN: minio
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      default:
        aliases:
          # Resolves the virtual-hosted-style host Polaris builds for the
          # 'orderbook-warehouse' bucket back to this container.
          - orderbook-warehouse.minio
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # One-shot init container: creates the warehouse bucket
  # ------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password &&
      mc mb --ignore-existing local/orderbook-warehouse &&
      echo 'Bucket orderbook-warehouse ready'
      "

  # ------------------------------------------------------------------
  # Apache Polaris — Iceberg REST catalog
  # ------------------------------------------------------------------
  polaris:
    image: apache/polaris:latest
    container_name: polaris
    ports:
      - "8181:8181"   # Catalog + management API
      - "8182:8182"   # Health/metrics
    environment:
      # Fixed root credentials so the demo is reproducible
      # (realm,clientId,clientSecret)
      POLARIS_BOOTSTRAP_CREDENTIALS: "default-realm,root,s3cr3t"
      # Credentials Polaris uses to talk to MinIO (S3FileIO)
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      # Without these, Polaris' internal S3/STS clients (used for
      # server-side commit/task bookkeeping, not just the client-facing
      # catalog config) default to real AWS instead of MinIO, causing
      # spurious 403s ("Access Key Id does not exist") on table commits.
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_ENDPOINT_URL_STS: http://minio:9000
      # In-memory metastore is fine for a demo (state lost on restart)
      polaris.persistence.type: in-memory
      polaris.realm-context.realms: default-realm
      # Allow non-AWS S3 endpoints (MinIO) without role assumption
      polaris.features."SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION": "true"
      polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES": '["S3"]'
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8182/q/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ------------------------------------------------------------------
  # One-shot init container: creates the 'orderbook' catalog + grants
  # ------------------------------------------------------------------
  polaris-init:
    image: curlimages/curl:latest
    container_name: polaris-init
    depends_on:
      polaris:
        condition: service_healthy
    volumes:
      - ./polaris-setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]

volumes:
  minio-data: